name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Run plugin tests
        run: |
          set -e
          for plugin in agent-plus-meta repo-analyze diff-summary skill-feedback skill-plus; do
            if [ -d "$plugin/test" ]; then
              echo "=== $plugin ==="
              python -m pytest "$plugin/test" -v
            fi
          done

  envelope-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: framework
      - uses: actions/checkout@v4
        with:
          repository: osouthgate/agent-plus-skills
          path: marketplace
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Stage plugins for envelope contract
        run: |
          mkdir -p plugins
          for p in agent-plus-meta repo-analyze diff-summary skill-feedback skill-plus; do
            if [ -d "framework/$p" ]; then
              cp -r "framework/$p" "plugins/$p"
            fi
          done
          for d in marketplace/*/.claude-plugin; do
            plugin_dir=$(dirname "$d")
            name=$(basename "$plugin_dir")
            if [ ! -d "plugins/$name" ]; then
              cp -r "$plugin_dir" "plugins/$name"
            fi
          done
          ls plugins
      - name: Run envelope contract probes
        env:
          AGENT_PLUS_PLUGINS_DIR: ${{ github.workspace }}/plugins
        run: |
          python -m unittest discover -s framework/agent-plus-meta/test/contract -p "test_envelope_contract.py" -v

  # v0.13.5: VERSION-vs-tag gate. Without this, the upgrade probe lies on
  # day one — the single-root VERSION file is the source of truth and MUST
  # match the latest annotated git tag at release time. Runs on every tag
  # push (the only time the assertion meaningfully holds) and is otherwise
  # a no-op so PRs and main-branch pushes never trip it.
  version-tag-gate:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assert VERSION matches the pushed tag
        run: |
          set -e
          if [ ! -f VERSION ]; then
            echo "VERSION file missing at repo root" >&2
            exit 1
          fi
          file_version=$(tr -d '[:space:]' < VERSION)
          tag_ref="${GITHUB_REF#refs/tags/}"
          tag_version="${tag_ref#v}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "VERSION ($file_version) != tag ($tag_version)" >&2
            echo "Bump VERSION before tagging, or re-tag to match." >&2
            exit 1
          fi
          # Cross-check: the tag we're on should be the latest annotated tag
          # too. If somebody pushed an older tag late, fail fast rather than
          # let the probe lie.
          latest_tag=$(git describe --tags --abbrev=0)
          latest_version="${latest_tag#v}"
          if [ "$file_version" != "$latest_version" ]; then
            echo "VERSION ($file_version) != latest annotated tag ($latest_version)" >&2
            exit 1
          fi
          echo "VERSION-vs-tag gate passed: $file_version"
