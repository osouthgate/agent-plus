name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run plugin tests
        run: |
          set -e
          for plugin in agent-plus repo-analyze diff-summary skill-feedback; do
            if [ -d "$plugin/test" ]; then
              echo "=== $plugin ==="
              python -m unittest discover -s "$plugin/test" -v
            fi
          done
