name: doc-drift

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  doc-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git tag comparison.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run doc-drift checks
        run: python3 .github/scripts/doc-drift-check.py
