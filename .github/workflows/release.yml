name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release and upload installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"

          # Create the release if it doesn't already exist.
          # Using view-or-create avoids swallowing real errors (auth, rate limits).
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag

          # Upload both installers as release assets.
          gh release upload "$TAG" install.sh install.ps1 --clobber
