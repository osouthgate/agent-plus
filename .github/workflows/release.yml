name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release and upload installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"

          # Create the release (no-op if it already exists from a manual push).
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            2>/dev/null || true

          # Upload both installers as release assets.
          gh release upload "$TAG" install.sh install.ps1 --clobber
